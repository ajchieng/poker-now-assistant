<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PokerNow Assistant</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --border: #d9dde5;
        --muted: #606775;
        --selected: #1769e0;
        --current: #f59e0b;
      }

      * { box-sizing: border-box; }
      body { width: 548px; margin: 0; padding: 16px; color: #171a21; background: #fff; }
      h1 { margin: 0; font-size: 18px; }
      p { margin: 5px 0 0; color: var(--muted); font-size: 12px; line-height: 1.4; }
      .header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }
      .header-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
      .toggle { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 600; white-space: nowrap; }
      .toolbar { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin: 14px 0 7px; }
      .range-metrics { display: flex; align-items: center; justify-content: flex-end; gap: 8px; margin: 0 0 10px; min-height: 16px; }
      .range-settings { margin-top: 14px; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: #fafbfc; }
      .setting-row { display: flex; align-items: center; gap: 8px; }
      .setting-row + .setting-row { margin-top: 9px; }
      .setting-row label { color: var(--muted); font-size: 12px; font-weight: 600; }
      select { border: 1px solid var(--border); border-radius: 5px; padding: 5px 7px; background: #fff; color: #242935; font: inherit; font-size: 12px; }
      .context-controls { display: flex; align-items: center; gap: 8px; margin-top: 9px; }
      .context-controls.hidden { display: none; }
      .context-help { margin-top: 7px; }
      .editing { margin-left: auto; color: var(--muted); font-size: 11px; }
      .preset-label { border: 1px solid var(--border); border-radius: 999px; padding: 2px 7px; color: var(--muted); background: #fff; font-size: 11px; font-weight: 600; white-space: nowrap; }
      .preset-label.default { border-color: #9bbfa4; color: #256235; background: #f1faf3; }
      .preset-label.custom { border-color: #aeb8c7; color: #374151; background: #f8fafc; }
      .preset-label.empty { border-color: #d6a96e; color: #8a4b08; background: #fff6e9; }
      .count { color: var(--muted); font-size: 12px; }
      .range-diff { color: var(--muted); font-size: 12px; white-space: nowrap; }
      .range-diff.custom { color: #8a4b08; }
      .range-diff.hidden { display: none; }
      .file-input { display: none; }
      button { border: 1px solid var(--border); border-radius: 5px; padding: 5px 9px; background: #fff; color: #242935; font: inherit; font-size: 12px; cursor: pointer; }
      button:hover { background: #f5f7fa; }
      #range { display: grid; grid-template-columns: 22px repeat(13, 32px); gap: 3px; user-select: none; }
      .header-cell, .cell { width: 32px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 11px; }
      .header-cell { width: 22px; color: var(--muted); font-weight: 600; }
      .top-header { width: 32px; }
      .cell { border: 1px solid var(--border); background: #f7f8fa; cursor: pointer; }
      .cell.suited { background: #eef7f0; }
      .cell.off { background: #fbf1f1; }
      .cell.pair { background: #f0f2fa; }
      .cell.selected { border-color: var(--selected); background: var(--selected); color: #fff; }
      .cell.current-hand { border-color: var(--current); box-shadow: inset 0 0 0 2px var(--current); }
      .cell.selected.current-hand { box-shadow: inset 0 0 0 2px #fff, 0 0 0 2px var(--current); }
      .runtime { margin-top: 12px; padding: 9px 10px; border: 1px solid var(--border); border-radius: 6px; background: #f8f9fb; font-size: 12px; }
      .runtime strong { margin-right: 4px; }
      .scan-badge { display: inline-flex; align-items: center; margin-left: 7px; border: 1px solid var(--border); border-radius: 999px; padding: 1px 7px; font-size: 11px; font-weight: 600; white-space: nowrap; }
      .scan-badge.ok { border-color: #9bbfa4; color: #256235; background: #f1faf3; }
      .scan-badge.cache { border-color: #d6a96e; color: #8a4b08; background: #fff6e9; }
      .scan-badge.blocked { border-color: #d6a96e; color: #8a4b08; background: #fff6e9; }
      .scan-badge.idle { color: var(--muted); background: #fff; }
      .diagnostics { margin-top: 10px; border: 1px solid var(--border); border-radius: 6px; background: #fff; font-size: 12px; }
      .diagnostics summary { padding: 8px 10px; color: #242935; font-weight: 600; cursor: pointer; }
      .diagnostics-content { padding: 0 10px 10px; color: var(--muted); }
      .diagnostics-grid { display: grid; grid-template-columns: 120px 1fr; gap: 5px 10px; margin: 0; }
      .diagnostics-grid dt { color: #374151; font-weight: 600; }
      .diagnostics-grid dd { margin: 0; min-width: 0; overflow-wrap: anywhere; }
      #bypassHand { min-width: 132px; }
      #bypassHand.active { border-color: #8a4b08; background: #fff6e9; color: #8a4b08; }
      .warning { color: #8a4b08; }
      #saveStatus { min-height: 16px; margin-top: 6px; color: var(--muted); font-size: 11px; }
    </style>
  </head>
  <body>
    <div class="header">
      <div>
        <h1>PokerNow Assistant</h1>
        <p>Preflop only. Blue hands are kept; the assistant is inactive after community cards appear.</p>
      </div>
      <div class="header-actions">
        <button id="bypassHand" type="button" disabled>Bypass this hand</button>
        <button id="refreshTable" type="button">Refresh table</button>
        <label class="toggle"><input id="enabled" type="checkbox" /> Enabled</label>
        <label class="toggle"><input id="soundEnabled" type="checkbox" /> Playable-hand sound</label>
      </div>
    </div>

    <div class="range-settings">
      <div class="setting-row">
        <label for="rangeMode">Range mode</label>
        <select id="rangeMode">
          <option value="single">Single range</option>
          <option value="position">Position + player count</option>
        </select>
        <span id="presetLabel" class="preset-label empty">Empty</span>
        <span id="editingLabel" class="editing">Editing single range</span>
      </div>
      <div id="positionControls" class="context-controls hidden">
        <label for="playerCount">Players</label>
        <select id="playerCount"></select>
        <label for="position">Position</label>
        <select id="position"></select>
        <button id="copySingle" type="button">Copy single range</button>
        <label class="toggle"><input id="autoFollowContext" type="checkbox" /> Follow table</label>
      </div>
      <p id="contextHelp" class="context-help">One range is used at every table.</p>
    </div>

    <div class="toolbar">
      <button id="selectAll" type="button">Keep all</button>
      <button id="selectNone" type="button">Clear</button>
      <button id="invert" type="button">Invert</button>
      <button id="resetDefault" type="button">Reset default</button>
      <button id="copyRange" type="button">Copy range</button>
      <button id="pasteRange" type="button">Paste range</button>
      <button id="exportConfig" type="button">Export config</button>
      <button id="importConfig" type="button">Import config</button>
      <input id="configFile" class="file-input" type="file" accept="application/json,.json" />
    </div>
    <div class="range-metrics">
      <span id="selectedCount" class="count"></span>
      <span id="rangeDiff" class="range-diff hidden"></span>
    </div>

    <div id="range" aria-label="Hold'em keep range"></div>
    <div id="runtimeStatus" class="runtime"><strong>Status:</strong> Open a PokerNow table.</div>
    <div id="saveStatus" aria-live="polite"></div>
    <details id="diagnosticsPanel" class="diagnostics">
      <summary>Diagnostics</summary>
      <div id="diagnosticsContent" class="diagnostics-content">No position scan diagnostics yet.</div>
    </details>

    <script src="assistant-core.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
